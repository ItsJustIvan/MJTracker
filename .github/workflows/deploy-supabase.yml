- name: Deploy Migrations to Production
        run: |
          # Use percent-encoded connection string directly via --db-url to push cleanly without Docker
          supabase db push --db-url "postgresql://postgres:${SUPABASE_DB_PASSWORD}@db.jjygvwosstcdnmlklsbo.supabase.co:5432/postgres"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}